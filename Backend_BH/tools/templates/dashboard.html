<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Conseiller Assurance - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.12.0/cdn.js" defer></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .analysis-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        .input-group input:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.loading {
            pointer-events: none;
        }

        .btn .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        .btn.loading .loading-spinner {
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-container {
            margin-top: 2rem;
            display: none;
        }

        .results-container.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4F46E5, #7C3AED, #059669, #DC2626);
        }

        .result-section {
            margin-bottom: 1.5rem;
        }

        .result-section h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .score-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .products-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--product-color, #4F46E5);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            border-color: var(--product-color, #4F46E5);
        }

        .product-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: var(--product-color, #4F46E5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #1F2937;
        }

        .product-branch {
            color: var(--product-color, #4F46E5);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: #6B7280;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .chart-container {
            height: 300px;
            margin: 2rem 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #DC2626;
        }

        .alert.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #059669;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" x-data="insuranceAgent()">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Agent Conseiller Assurance</h1>
            <p>Intelligence Artificielle pour recommandations personnalisées</p>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Analysis Panel -->
            <div class="analysis-panel">
                <h2><i class="fas fa-search"></i> Analyse Client</h2>
                
                <div class="input-group">
                    <label for="clientRef">Référence Client</label>
                    <input 
                        type="text" 
                        id="clientRef" 
                        x-model="clientRef" 
                        placeholder="Ex: 1381"
                        @keyup.enter="analyzeClient"
                    >
                </div>

                <button 
                    class="btn" 
                    :class="{ 'loading': isLoading }" 
                    @click="analyzeClient"
                    :disabled="isLoading || !clientRef"
                >
                    <span class="loading-spinner"></span>
                    <span x-text="isLoading ? 'Analyse en cours...' : 'Lancer l\'analyse'"></span>
                </button>

                <!-- Results -->
                <div class="results-container" :class="{ 'show': showResults }">
                    <template x-if="error">
                        <div class="alert error">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span x-text="error"></span>
                        </div>
                    </template>

                    <template x-if="analysis && !error">
                        <div class="result-card">
                            <div class="result-section">
                                <h3><i class="fas fa-brain"></i> Raisonnement</h3>
                                <p x-text="analysis.raisonnement"></p>
                            </div>

                            <div class="result-section">
                                <h3><i class="fas fa-award"></i> Produit Recommandé</h3>
                                <div class="product-recommendation">
                                    <strong x-text="analysis.produit_recommande"></strong>
                                    <span class="product-branch" x-text="analysis.branche"></span>
                                </div>
                            </div>

                            <div class="result-section">
                                <h3><i class="fas fa-chart-line"></i> Score de Pertinence</h3>
                                <div class="score-badge">
                                    <i class="fas fa-star"></i>
                                    <span x-text="analysis.score_pertinence + '/100'"></span>
                                </div>
                                <p x-text="analysis.justification_score" style="margin-top: 0.5rem; font-size: 0.9rem;"></p>
                            </div>

                            <div class="result-section">
                                <h3><i class="fas fa-bullhorn"></i> Pitch Personnalisé</h3>
                                <p x-text="analysis.pitch"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Stats Panel -->
            <div class="analysis-panel">
                <h2><i class="fas fa-chart-bar"></i> Statistiques</h2>
                
                <div class="stats-grid">
                    <div class="stat-card" style="background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);">
                        <span class="stat-number" x-text="stats.total_analyses"></span>
                        <span class="stat-label">Analyses Totales</span>
                    </div>
                    
                    <div class="stat-card" style="background: linear-gradient(135deg, #059669 0%, #10B981 100%);">
                        <span class="stat-number" x-text="stats.taux_succes + '%'"></span>
                        <span class="stat-label">Taux de Succès</span>
                    </div>
                    
                    <div class="stat-card" style="background: linear-gradient(135deg, #DC2626 0%, #EF4444 100%);">
                        <span class="stat-number" x-text="stats.score_moyen"></span>
                        <span class="stat-label">Score Moyen</span>
                    </div>
                    
                    <div class="stat-card" style="background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%);">
                        <span class="stat-number" x-text="stats.analyses_aujourdhui"></span>
                        <span class="stat-label">Analyses Aujourd'hui</span>
                    </div>
                </div>

                <!-- Chart -->
                <div class="chart-container">
                    <canvas id="branchChart"></canvas>
                </div>
            </div>
        </div>

        <!--
