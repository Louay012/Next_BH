<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent AI BH Assurance - Recommandations Commerciales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .panel h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        .client-selector {
            margin-bottom: 20px;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        button {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .client-info {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            border-left: 5px solid #3498db;
        }

        .client-info h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            padding: 8px 12px;
            background: #ecf0f1;
            border-radius: 5px;
            font-size: 14px;
        }

        .contracts-list {
            margin-top: 15px;
        }

        .contract-item {
            background: #e8f4fd;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #3498db;
        }

        .recommendations {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            border-left: 5px solid #e74c3c;
        }

        .recommendation-item {
            background: #fdf2f2;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 3px solid #e74c3c;
        }

        .recommendation-item h4 {
            color: #c0392b;
            margin-bottom: 10px;
        }

        .chat-container {
            height: 400px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 80%;
        }

        .agent-message {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .user-message {
            background: #ecf0f1;
            color: #2c3e50;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .contact-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .contact-btn {
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
        }

        .email-btn { background: #e74c3c; }
        .phone-btn { background: #f39c12; }
        .whatsapp-btn { background: #27ae60; }

        .stats-panel {
            grid-column: 1 / -1;
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Agent AI BH Assurance</h1>
            <p>Système intelligent de recommandations commerciales personnalisées</p>
        </div>

        <div class="main-content">
            <!-- Panel d'analyse client -->
            <div class="panel">
                <h2>📊 Analyse Client</h2>
                
                <div class="client-selector">
                    <select id="clientSelect">
                        <option value="">Sélectionnez un client...</option>
                    </select>
                    <button onclick="analyzeClient()">Analyser le Client</button>
                </div>

                <div id="clientAnalysis"></div>
            </div>

            <!-- Panel de recommandations -->
            <div class="panel">
                <h2>💡 Recommandations</h2>
                <div id="recommendations"></div>
            </div>

            <!-- Panel de conversation -->
            <div class="panel">
                <h2>💬 Conversation Commerciale</h2>
                <div class="chat-container" id="chatContainer"></div>
                
                <div class="contact-options">
                    <button class="contact-btn email-btn" onclick="sendEmail()">📧 Email</button>
                    <button class="contact-btn phone-btn" onclick="makeCall()">📞 Appel</button>
                    <button class="contact-btn whatsapp-btn" onclick="sendWhatsApp()">💬 WhatsApp</button>
                </div>
                
                <input type="text" id="messageInput" placeholder="Tapez votre message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Envoyer Message</button>
            </div>

            <!-- Panel de génération de pitch -->
            <div class="panel">
                <h2>🎯 Génération de Pitch</h2>
                <button onclick="generatePitch()">Générer Pitch Personnalisé</button>
                <div id="pitchResult"></div>
            </div>
        </div>

        <!-- Tableau de bord statistiques -->
        <div class="stats-panel">
            <h2>📈 Tableau de Bord</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalClients">0</div>
                    <div class="stat-label">Clients Analysés</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalOpportunities">0</div>
                    <div class="stat-label">Opportunités Détectées</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalConversations">0</div>
                    <div class="stat-label">Conversations Initiées</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="conversionRate">0%</div>
                    <div class="stat-label">Taux de Conversion</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Base de données clients simulée
        const clientsDatabase = [
            {
                id: 1,
                nom: "Dr. Martin Dubois",
                age: 45,
                profession: "Médecin",
                situationFamiliale: "Marié, 2 enfants",
                revenus: "Élevés",
                email: "martin.dubois@email.com",
                telephone: "+33 6 12 34 56 78",
                whatsapp: "+33 6 12 34 56 78",
                contrats: [
                    { type: "Auto", produit: "Assurance Véhicule Premium", montant: 1200 }
                ]
            },
            {
                id: 2,
                nom: "Sophie et Pierre Lemaire",
                age: 28,
                profession: "Ingénieurs",
                situationFamiliale: "Jeune couple",
                revenus: "Moyens",
                email: "sophie.lemaire@email.com",
                telephone: "+33 6 98 76 54 32",
                whatsapp: "+33 6 98 76 54 32",
                contrats: [
                    { type: "Habitation", produit: "Assurance Logement Essentiel", montant: 800 }
                ]
            },
            {
                id: 3,
                nom: "Michel Rousseau",
                age: 55,
                profession: "Entrepreneur",
                situationFamiliale: "Divorcé",
                revenus: "Très élevés",
                email: "m.rousseau@entreprise.com",
                telephone: "+33 6 55 44 33 22",
                whatsapp: "+33 6 55 44 33 22",
                contrats: [
                    { type: "Auto", produit: "Assurance Véhicule Luxe", montant: 2500 },
                    { type: "Habitation", produit: "Assurance Résidence Premium", montant: 1800 }
                ]
            },
            {
                id: 4,
                nom: "Emma Petit",
                age: 26,
                profession: "Étudiante en médecine",
                situationFamiliale: "Célibataire",
                revenus: "Faibles",
                email: "emma.petit@univ.fr",
                telephone: "+33 7 11 22 33 44",
                whatsapp: "+33 7 11 22 33 44",
                contrats: []
            }
        ];

        // Moteur de règles pour les recommandations
        const recommendationEngine = {
            "Médecin": [
                { produit: "Épargne Retraite Madelin", priorité: "Haute", raison: "Avantages fiscaux spécifiques aux professions libérales" },
                { produit: "Prévoyance Professionnelle", priorité: "Haute", raison: "Protection en cas d'arrêt de travail" },
                { produit: "Assurance Responsabilité Civile Pro", priorité: "Moyenne", raison: "Protection contre les risques professionnels" }
            ],
            "Ingénieur": [
                { produit: "Assurance Vie", priorité: "Haute", raison: "Constitution d'un patrimoine à long terme" },
                { produit: "Épargne Retraite", priorité: "Moyenne", raison: "Complément de retraite" },
                { produit: "Assurance Santé", priorité: "Haute", raison: "Couverture santé optimale" }
            ],
            "Entrepreneur": [
                { produit: "Assurance Homme Clé", priorité: "Très Haute", raison: "Protection de l'entreprise" },
                { produit: "Épargne Retraite Article 83", priorité: "Haute", raison: "Optimisation fiscale" },
                { produit: "Assurance Crédit", priorité: "Moyenne", raison: "Sécurisation des emprunts" }
            ],
            "Étudiant": [
                { produit: "Assurance Santé Étudiante", priorité: "Haute", raison: "Couverture santé adaptée" },
                { produit: "Assurance Habitation Étudiant", priorité: "Moyenne", raison: "Protection du logement étudiant" }
            ]
        };

        // Variables globales
        let currentClient = null;
        let conversationHistory = [];
        let stats = {
            clientsAnalyzed: 0,
            opportunitiesDetected: 0,
            conversationsStarted: 0,
            conversions: 0
        };

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            loadClients();
            updateStats();
        });

        function loadClients() {
            const select = document.getElementById('clientSelect');
            clientsDatabase.forEach(client => {
                const option = document.createElement('option');
                option.value = client.id;
                option.textContent = `${client.nom} - ${client.profession}`;
                select.appendChild(option);
            });
        }

        function analyzeClient() {
            const clientId = document.getElementById('clientSelect').value;
            if (!clientId) {
                showAlert('Veuillez sélectionner un client', 'error');
                return;
            }

            currentClient = clientsDatabase.find(c => c.id == clientId);
            if (!currentClient) return;

            displayClientAnalysis();
            generateRecommendations();
            stats.clientsAnalyzed++;
            updateStats();
        }

        function displayClientAnalysis() {
            const analysisDiv = document.getElementById('clientAnalysis');
            
            const contractsList = currentClient.contrats.map(contrat => 
                `<div class="contract-item">
                    <strong>${contrat.type}</strong>: ${contrat.produit} (${contrat.montant}€/an)
                </div>`
            ).join('');

            analysisDiv.innerHTML = `
                <div class="client-info">
                    <h3>👤 Profil Client</h3>
                    <div class="info-grid">
                        <div class="info-item"><strong>Nom:</strong> ${currentClient.nom}</div>
                        <div class="info-item"><strong>Âge:</strong> ${currentClient.age} ans</div>
                        <div class="info-item"><strong>Profession:</strong> ${currentClient.profession}</div>
                        <div class="info-item"><strong>Situation:</strong> ${currentClient.situationFamiliale}</div>
                    </div>
                    
                    <div class="contracts-list">
                        <h4>📋 Contrats Actuels:</h4>
                        ${contractsList || '<p>Aucun contrat souscrit</p>'}
                    </div>
                </div>
            `;
        }

        function generateRecommendations() {
            const recommendationsDiv = document.getElementById('recommendations');
            
            // Déterminer les recommandations basées sur la profession
            let recommendations = [];
            const profession = currentClient.profession.includes('Médecin') ? 'Médecin' : 
                             currentClient.profession.includes('Ingénieur') ? 'Ingénieur' :
                             currentClient.profession.includes('Entrepreneur') ? 'Entrepreneur' :
                             currentClient.profession.includes('Étudiant') ? 'Étudiant' : 'Générique';

            if (recommendationEngine[profession]) {
                recommendations = recommendationEngine[profession];
            }

            // Filtrer les recommandations selon les contrats existants
            const existingTypes = currentClient.contrats.map(c => c.type.toLowerCase());
            
            // Ajouter des recommandations génériques si manque de couverture de base
            if (!existingTypes.includes('auto') && currentClient.age > 18) {
                recommendations.push({ 
                    produit: "Assurance Auto", 
                    priorité: "Haute", 
                    raison: "Couverture véhicule indispensable" 
                });
            }
            
            if (!existingTypes.includes('habitation') && currentClient.age > 20) {
                recommendations.push({ 
                    produit: "Assurance Habitation", 
                    priorité: "Haute", 
                    raison: "Protection du logement obligatoire" 
                });
            }

            const recommendationsHTML = recommendations.map(rec => `
                <div class="recommendation-item">
                    <h4>🎯 ${rec.produit}</h4>
                    <p><strong>Priorité:</strong> <span style="color: ${getPriorityColor(rec.priorité)}">${rec.priorité}</span></p>
                    <p><strong>Raison:</strong> ${rec.raison}</p>
                </div>
            `).join('');

            recommendationsDiv.innerHTML = `
                <div class="recommendations">
                    <h3>💡 Produits Recommandés</h3>
                    ${recommendationsHTML || '<p>Aucune recommandation disponible</p>'}
                </div>
            `;

            stats.opportunitiesDetected += recommendations.length;
            updateStats();
        }

        function getPriorityColor(priority) {
            switch(priority) {
                case 'Très Haute': return '#e74c3c';
                case 'Haute': return '#f39c12';
                case 'Moyenne': return '#3498db';
                default: return '#95a5a6';
            }
        }

        function generatePitch() {
            if (!currentClient) {
                showAlert('Veuillez d\'abord analyser un client', 'error');
                return;
            }

            const pitchDiv = document.getElementById('pitchResult');
            pitchDiv.innerHTML = '<div class="loading"></div> Génération du pitch...';

            // Simulation de génération IA
            setTimeout(() => {
                const pitch = createPersonalizedPitch();
                pitchDiv.innerHTML = `
                    <div class="alert alert-success">
                        <h4>🎯 Pitch Personnalisé Généré</h4>
                        <p>${pitch}</p>
                    </div>
                `;
            }, 2000);
        }

        function createPersonalizedPitch() {
            const client = currentClient;
            const profession = client.profession;
            const age = client.age;
            
            let pitch = `Bonjour ${client.nom.split(' ')[client.nom.split(' ').length - 1]}, `;
            
            if (profession.includes('Médecin')) {
                pitch += `en tant que médecin, vous savez mieux que quiconque l'importance de la prévoyance. J'ai remarqué que vous n'avez actuellement qu'une assurance auto. Avez-vous pensé à sécuriser votre activité professionnelle avec une épargne retraite Madelin ? Elle vous permettrait de déduire jusqu'à 10% de vos revenus de vos impôts.`;
            } else if (profession.includes('Ingénieur')) {
                pitch += `votre profil d'ingénieur montre que vous êtes quelqu'un de prévoyant. J'ai analysé votre situation et je pense qu'une assurance vie pourrait parfaitement compléter votre assurance habitation actuelle. C'est un excellent moyen de constituer un patrimoine tout en bénéficiant d'avantages fiscaux.`;
            } else if (profession.includes('Entrepreneur')) {
                pitch += `en tant qu'entrepreneur, vous savez que votre entreprise dépend de vous. J'ai identifié une opportunité importante : une assurance homme clé qui protégerait votre entreprise en cas de problème. C'est un investissement intelligent qui rassure aussi vos partenaires et banquiers.`;
            } else {
                pitch += `j'ai analysé votre profil et identifié des opportunités d'améliorer votre couverture. Basé sur votre situation actuelle, je peux vous proposer des solutions parfaitement adaptées à vos besoins.`;
            }
            
            pitch += ` Puis-je vous expliquer les avantages en détail ? Cela ne vous prendra que quelques minutes et pourrait vous faire économiser beaucoup d'argent.`;
            
            return pitch;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessageToChat('user', message);
            input.value = '';
            
            // Simulation de réponse de l'agent IA
            setTimeout(() => {
                const response = generateAgentResponse(message);
                addMessageToChat('agent', response);
            }, 1000);
            
            stats.conversationsStarted++;
            updateStats();
        }

        function addMessageToChat(sender, message) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = message;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            conversationHistory.push({ sender, message, timestamp: new Date() });
        }

        function generateAgentResponse(userMessage) {
            const message = userMessage.toLowerCase();
            
            if (message.includes('non') || message.includes('pas intéressé')) {
                return "Je comprends votre position. Puis-je vous demander ce qui vous préoccupe le plus dans votre situation actuelle ? Peut-être puis-je vous proposer quelque chose de plus adapté ?";
            } else if (message.includes('oui') || message.includes('intéressé')) {
                stats.conversions++;
                updateStats();
                return "Parfait ! Je vais préparer une proposition personnalisée pour vous. Quand seriez-vous disponible pour un rendez-vous détaillé ?";
            } else if (message.includes('prix') || message.includes('coût')) {
                return "Le coût dépend de plusieurs facteurs spécifiques à votre situation. Je peux vous préparer un devis gratuit et sans engagement. Préférez-vous que je vous l'envoie par email ?";
            } else if (message.includes('réfléchir')) {
                return "Bien sûr, c'est une décision importante. Puis-je vous envoyer une documentation détaillée ? Je peux aussi vous rappeler dans quelques jours si vous le souhaitez.";
            } else {
                return "Je comprends votre question. Basé sur votre profil, je pense que cette solution pourrait vraiment vous apporter de la valeur. Souhaitez-vous que je vous explique les bénéfices concrets pour votre situation ?";
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendEmail() {
            if (!currentClient) {
                showAlert('Veuillez d\'abord analyser un client', 'error');
                return;
            }
            
            const subject = "Proposition personnalisée - BH Assurance";
            const body = createEmailContent();
            
            showAlert(`Email envoyé à ${currentClient.email}`, 'success');
            console.log('Email envoyé:', { to: currentClient.email, subject, body });
        }

        function makeCall() {
            if (!currentClient) {
                showAlert('Veuillez d\'abord analyser un client', 'error');
                return;
            }
            
            showAlert(`Appel initié vers ${currentClient.telephone}`, 'success');
            console.log('Appel vers:', currentClient.telephone);
        }

        function sendWhatsApp() {
            if (!currentClient) {
                showAlert('Veuillez d\'abord analyser un client', 'error');
                return;
            }
            
            const message = createWhatsAppMessage();
            showAlert(`Message WhatsApp envoyé à ${currentClient.whatsapp}`, 'success');
            console.log('WhatsApp envoyé:', { to: currentClient.whatsapp, message });
        }

        function createEmailContent() {
            return `
                Bonjour ${currentClient.nom},
                
                Suite à notre analyse, j'ai identifié des opportunités d'améliorer votre couverture d'assurance.
                
                Vos contrats actuels:
                ${currentClient.contrats.map(c => `- ${c.type}: ${c.produit}`).join('\n')}
                
                Mes recommandations personnalisées sont disponibles pour discussion.
                
                Cordialement,
                Votre conseiller BH Assurance
            `;
        }

        function createWhatsAppMessage() {
            return `Bonjour ${currentClient.nom.split(' ')[0]}, j'ai analysé votre profil et identifié des opportunités intéressantes pour optimiser votre couverture. Êtes-vous disponible pour en discuter ?`;
        }

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            document.body.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }

        function updateStats() {
            document.getElementById('totalClients').textContent = stats.clientsAnalyzed;
            document.getElementById('totalOpportunities').textContent = stats.opportunitiesDetected;
            document.getElementById('totalConversations').textContent = stats.conversationsStarted;
            
            const conversionRate = stats.conversationsStarted > 0 ? 
                Math.round((stats.conversions / stats.conversationsStarted) * 100) : 0;
            document.getElementById('conversionRate').textContent = conversionRate + '%';
        }

        // Fonctions bonus
        function exportData() {
            const data = {
                stats,
                conversationHistory,
                analyzedClients: currentClient ? [currentClient] : []
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bh-assurance-export.json';
            a.click();
        }
    </script>
</body>
</html>
